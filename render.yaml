services:
  - type: web
    name: villa-adora-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: anthropic/claude-sonnet-4
      - key: LLM_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /
    autoDeploy: true
