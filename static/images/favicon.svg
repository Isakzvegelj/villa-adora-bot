<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1e3c72"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  
  <!-- Stylized "A" for Adora -->
  <g transform="translate(256, 256)">
    <!-- Left leg -->
    <polygon points="-80,60 -20,-60 0,-60 -60,60" fill="white" opacity="0.95"/>
    <!-- Right leg -->
    <polygon points="80,60 20,-60 0,-60 60,60" fill="white" opacity="0.95"/>
    <!-- Crossbar -->
    <rect x="-50" y="-8" width="100" height="22" rx="4" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Subtle mountain/water hint at bottom -->
  <path d="M120,400 Q180,370 256,380 Q332,370 392,400 L392,420 Q332,400 256,410 Q180,400 120,420 Z" fill="rgba(255,255,255,0.06)"/>
</svg>